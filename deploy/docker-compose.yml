services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aimeeting-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aimeeting
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aimeeting}
      POSTGRES_DB: aimeeting
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aimeeting"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aimeeting-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: aimeeting-backend
    restart: unless-stopped
    env_file:
      - ../backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://aimeeting:${POSTGRES_PASSWORD:-aimeeting}@postgres:5432/aimeeting
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: aimeeting-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
