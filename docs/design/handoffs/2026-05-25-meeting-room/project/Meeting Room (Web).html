<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<title>会议室 Web · Q3 路线图对齐</title>
<meta name="viewport" content="width=1440" />
<style>
  html, body {
    margin: 0; padding: 0; min-height: 100vh;
    background: #1A1A1F;
    font-family: -apple-system, "SF Pro Text", "Helvetica Neue", Helvetica, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased; color: #000;
    overflow-x: auto;
  }
  body {
    display: flex; align-items: center; justify-content: center;
    padding: 0; min-height: 100vh;
  }
  #stage {
    width: 1440px; height: 900px;
    transform-origin: center center;
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="browser-window.jsx"></script>
<script type="text/babel" src="meeting-room-shared.jsx"></script>
<script type="text/babel" src="meeting-room-web-parts.jsx"></script>
<script type="text/babel" src="meeting-room-web.jsx"></script>
<script>
  function scaleStage() {
    const stage = document.getElementById('stage');
    if (!stage) return;
    const w = window.innerWidth, h = window.innerHeight;
    const s = Math.min(w / 1440, h / 900, 1);
    stage.style.transform = `scale(${s})`;
  }
  window.addEventListener('resize', scaleStage);
  window.addEventListener('load', scaleStage);
  setTimeout(scaleStage, 50);
</script>
</head>
<body>
  <div id="stage"><div id="root"></div></div>
</body>
</html>
